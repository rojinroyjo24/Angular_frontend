<h2>View Todos</h2>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Completed</th>
        <th>Actions </th>
    </tr>
    </thead>

    <tbody>
        @for( todo of mydata ; track todo.id )
        {
            <tr>
                <td>{{ todo.id }}</td>
                <td>{{ todo.title }}</td>
                <td>{{ todo.completed ? 'Yes' : 'No' }}</td>
                <td>
                    <button class="btn btn-danger" (click)="deleteTodo(todo.id)">Delete</button> &nbsp;

                    <button class="btn btn-danger"(click)="editTodo(todo.id)">Edit</button>

                </td>
            </tr>
        }
    </tbody>


</table>
